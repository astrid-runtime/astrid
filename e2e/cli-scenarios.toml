# Built-in CLI runtime coverage manifest.
#
# The drift gate in crates/astrid-cli/src/cli.rs compares this file to the
# Clap leaf-command inventory. Add a row when adding a built-in command. Dynamic
# capsule verbs are covered separately by first-party-capsule-scenarios.toml.
#
# status = "mapped" means the command is assigned to a planned scenario family.
# status = "covered" means the current runtime harness executes an assertion for
# that command path. This file is not yet the full semantic sweep from #1068.

[commands."chat"]
scenario = "prompt_fake_openai_compat"
status = "mapped"
mode = "interactive"
principal = "agent"

[commands."run"]
scenario = "prompt_fake_openai_compat"
status = "covered"
mode = "prompt"
principal = "agent"

