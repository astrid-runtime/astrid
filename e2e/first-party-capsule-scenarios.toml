# First-party capsule command coverage manifest.
#
# This is intentionally separate from the built-in CLI manifest. Arbitrary
# third-party capsule verbs are runtime user content; only shipped first-party
# capsule verbs belong in core CI.
#
# status = "mapped" means the command/provider is assigned to a planned scenario
# family. status = "covered" means the current runtime harness executes it.

[capsule_commands."astrid-capsule-registry models"]
scenario = "model_principal_isolation"
status = "covered"
provider = "astrid-capsule-registry"
reason = "Registry owns dynamic model listing/binding commands used by chat and HTTP model routes."

[capsule_commands."astrid-capsule-openai-compat provider"]
scenario = "prompt_fake_openai_compat"
status = "covered"
provider = "astrid-capsule-openai-compat"
reason = "Provider route is exercised through the fake OpenAI-compatible server rather than as a direct CLI verb."

[capsule_commands."budget"]
scenario = "budget_core_transitional"
status = "future"
provider = "unassigned"
reason = "Keep a manifest slot ready for moving budget out of core without losing coverage."
