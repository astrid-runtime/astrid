# Runtime e2e scenario contracts.
#
# The surface manifests map commands, routes, capsule commands, and capability
# ids to these scenario families. A scenario is executable only when it names the
# auth shape, success expectation, denial expectation, state transition, and
# evidence the harness must assert. Drift tests reject mappings to scenarios
# missing these fields.

[scenarios.active_context]
status = "covered"
surfaces = ["cli"]
auth = ["local CLI context only"]
success = ["agent current/switch reflects the active principal"]
denial = ["missing or deleted active principal is surfaced as a bounded diagnostic"]
state = ["active principal context changes only in the temp ASTRID_HOME"]
evidence = ["CLI output and config-path artifacts"]

[scenarios.agent_stream]
status = "covered"
surfaces = ["http"]
auth = ["bearer"]
success = ["SSE stream opens with a ready event or a bounded readiness error"]
denial = ["missing bearer is rejected before stream setup"]
state = ["no cross-principal stream state is persisted"]
evidence = ["gateway-prompt.sse and HTTP status artifacts"]

