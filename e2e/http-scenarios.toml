# Gateway HTTP runtime coverage manifest.
#
# crates/astrid-gateway/tests/router.rs compares this to the OpenAPI method
# inventory. Add a row when adding a gateway method. Paths use OpenAPI `{id}`
# parameter syntax, not axum `:id` syntax.
#
# status = "mapped" means the route is assigned to a planned scenario family.
# status = "covered" means the current runtime harness executes an assertion for
# that route path. This file is not yet the full semantic sweep from #1068.

