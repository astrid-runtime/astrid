name: CI

on:
  push:
    branches: [main, stream-*]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Run cargo check
        run: cargo check --workspace --all-features --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # The astrid-capsule test binary statically links the entire dependency
      # tree (wasmtime, aws-lc, ring, surrealkv, ...). With full debug info the
      # final link exhausts the runner and the linker dies (collect2/lld SIGBUS
      # / SIGABRT). Strip debug info for the test build only — debuginfo is the
      # dominant contributor to both linker peak memory and target/ disk. This
      # is CI-scoped via Cargo profile env overrides; local and dev builds keep
      # full debug info. See #954.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Run tests
        if: matrix.os != 'macos-latest'
        run: cargo test --workspace --locked

      - name: Run tests (macOS serial)
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --locked -- --test-threads=1

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Check MSRV compiles
        run: cargo check --workspace --locked

  api-compatibility:
    name: Public API compatibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect public API inputs
        id: api-inputs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD | tee changed-files.txt

          if grep -Eq '(^Cargo\.toml$|^crates/[^/]+/Cargo\.toml$|^crates/.*\.rs$|^crates/[^/]+/build\.rs$|^crates/[^/]+/wit/|^wit/)' changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Public API inputs changed; running cargo-semver-checks."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No public API inputs changed; skipping cargo-semver-checks."
          fi

      - name: Install Rust toolchain
        if: steps.api-inputs.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        if: steps.api-inputs.outputs.run == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Check public API compatibility
        if: steps.api-inputs.outputs.run == 'true'
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        with:
          manifest-path: Cargo.toml
          baseline-rev: ${{ github.event.pull_request.base.sha }}
          feature-group: all-features
          rust-toolchain: manual
          github-token: ${{ github.token }}

  public-rust-api-diff:
    name: Public Rust API diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect public API inputs
        id: api-inputs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD | tee changed-files.txt

          if grep -Eq '(^Cargo\.toml$|^crates/[^/]+/Cargo\.toml$|^crates/.*\.rs$|^crates/[^/]+/build\.rs$|^crates/[^/]+/wit/|^wit/)' changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Public API inputs changed; running cargo-public-api."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No public API inputs changed; skipping cargo-public-api."
          fi

      - name: Install Rust toolchains
        if: steps.api-inputs.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly

      - name: Cache Rust artifacts
        if: steps.api-inputs.outputs.run == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Install cargo-public-api
        if: steps.api-inputs.outputs.run == 'true'
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2
        with:
          tool: cargo-public-api

      - name: Check public Rust item diff
        if: steps.api-inputs.outputs.run == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git log --format=%B "$BASE_SHA..$HEAD_SHA" \
            | grep -Eq '(^[A-Za-z0-9_-]+(\([^)]*\))?!:|^BREAKING[ -]CHANGE:)'; then
            DENY=""
            echo "Breaking-change marker found; reporting public API diff without denying changes."
          else
            DENY="--deny changed --deny removed"
            echo "No breaking-change marker found; denying changed or removed public API items."
          fi

          packages=$(cargo metadata --locked --format-version 1 --no-deps \
            | jq -r '.packages[]
              | select(.publish == null)
              | select(any(.targets[]; any(.kind[]; . == "lib")))
              | .name')

          for package in $packages; do
            echo "::group::cargo public-api $package"
            cargo public-api \
              --package "$package" \
              --all-features \
              -ss \
              diff \
              $DENY \
              --force \
              "$BASE_SHA..HEAD"
            echo "::endgroup::"
          done

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verify lockfile
        run: cargo metadata --locked --no-deps > /dev/null

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
