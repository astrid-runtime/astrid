name: CI

on:
  push:
    branches: [main, stream-*]
    paths:
      - '**.rs'
      - 'scripts/release_manifest.py'
      - 'scripts/test_release_manifest.py'
      - 'scripts/release_publication.py'
      - 'scripts/test_release_publication.py'
      - 'scripts/release_draft_recovery.py'
      - 'scripts/test_release_draft_recovery.py'
      - 'scripts/crate_publication.py'
      - 'scripts/test_crate_publication.py'
      - 'scripts/channel_metadata.py'
      - 'scripts/test_channel_metadata.py'
      - 'scripts/channel_publication.py'
      - 'scripts/test_channel_publication.py'
      - 'scripts/test_channel_workflow_contract.sh'
      - 'scripts/nightly_version.py'
      - 'scripts/test_nightly_version.py'
      - 'release/nightly.toml'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - 'scripts/release_manifest.py'
      - 'scripts/test_release_manifest.py'
      - 'scripts/release_publication.py'
      - 'scripts/test_release_publication.py'
      - 'scripts/release_draft_recovery.py'
      - 'scripts/test_release_draft_recovery.py'
      - 'scripts/crate_publication.py'
      - 'scripts/test_crate_publication.py'
      - 'scripts/channel_metadata.py'
      - 'scripts/test_channel_metadata.py'
      - 'scripts/channel_publication.py'
      - 'scripts/test_channel_publication.py'
      - 'scripts/test_channel_workflow_contract.sh'
      - 'scripts/nightly_version.py'
      - 'scripts/test_nightly_version.py'
      - 'release/nightly.toml'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Run cargo check
        run: cargo check --workspace --all-features --locked

      - name: Test release manifest contract
        run: |
          python3 scripts/test_release_manifest.py
          python3 scripts/test_release_publication.py
          python3 scripts/test_release_draft_recovery.py
          python3 scripts/test_crate_publication.py
          python3 scripts/test_channel_metadata.py
          python3 scripts/test_channel_publication.py
          python3 scripts/test_nightly_version.py
          bash scripts/test_channel_workflow_contract.sh

  wasm-portability:
    name: Wasm portability
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Check wasm32 portability of kernel semantics crates
        run: ./scripts/check-wasm-portability.sh

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # The astrid-capsule test binary statically links the entire dependency
      # tree (wasmtime, aws-lc, ring, surrealkv, ...). With full debug info the
      # final link exhausts the runner and the linker dies (collect2/lld SIGBUS
      # / SIGABRT). Strip debug info for the test build only — debuginfo is the
      # dominant contributor to both linker peak memory and target/ disk. This
      # is CI-scoped via Cargo profile env overrides; local and dev builds keep
      # full debug info. See #954.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Run tests
        if: matrix.os != 'macos-latest'
        run: cargo test --workspace --locked

      - name: Run tests (macOS serial)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          RUST_BACKTRACE: full
        run: |
          set -o pipefail

          set +e
          cargo test --workspace --locked -- --test-threads=1
          status=$?
          set -e

          if [[ $status -ne 0 ]]; then
            echo "::group::macOS failure diagnostics"
            echo "exit_status=$status"
            uname -a || true
            sw_vers || true
            sysctl -n hw.optional.arm64 hw.memsize hw.ncpu || true
            ulimit -a || true

            echo "::group::Recent relevant processes"
            ps -axo pid,ppid,pgid,stat,comm,args \
              | grep -E 'astrid_capsule|cargo|rustc|sleep| sh ' \
              | grep -v grep || true
            echo "::endgroup::"

            echo "::group::Recent macOS abort/crash log entries"
            log show --last 10m --style compact --info --debug \
              --predicate 'eventMessage CONTAINS[c] "SIGABRT" OR eventMessage CONTAINS[c] "abort" OR eventMessage CONTAINS[c] "crash" OR eventMessage CONTAINS[c] "killed" OR eventMessage CONTAINS[c] "terminated" OR process CONTAINS[c] "astrid_capsule" OR process CONTAINS[c] "sleep"' \
              || true
            echo "::endgroup::"

            echo "::group::Diagnostic reports"
            for dir in "$HOME/Library/Logs/DiagnosticReports" "/Library/Logs/DiagnosticReports"; do
              [[ -d "$dir" ]] || continue
              echo "Reports in $dir"
              find "$dir" -maxdepth 1 -type f \( -name '*astrid*' -o -name '*cargo*' -o -name '*rustc*' -o -name '*sleep*' \) -print \
                | while read -r report; do
                    echo "--- $report"
                    sed -n '1,220p' "$report" || true
                  done
            done
            echo "::endgroup::"
            echo "::endgroup::"
          fi

          exit "$status"

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Check MSRV compiles
        run: cargo check --workspace --locked

  api-compatibility:
    name: Public API compatibility
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect public API inputs
        id: api-inputs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD | tee changed-files.txt

          if grep -Eq '(^Cargo\.toml$|^crates/[^/]+/Cargo\.toml$|^crates/[^/]+/src/.*\.rs$|^crates/[^/]+/build\.rs$|^crates/[^/]+/wit/|^wit/)' changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Public API inputs changed; running cargo-semver-checks."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No public API inputs changed; skipping cargo-semver-checks."
          fi

      - name: Install Rust toolchain
        if: steps.api-inputs.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        if: steps.api-inputs.outputs.run == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Detect breaking-change marker
        if: steps.api-inputs.outputs.run == 'true'
        id: breaking-change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git log --format=%B "$BASE_SHA..$HEAD_SHA" \
            | grep -Eq '(^[A-Za-z0-9_-]+(\([^)]*\))?!:|^BREAKING[ -]CHANGE:)'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Breaking-change marker found; cargo-semver-checks is skipped."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No breaking-change marker found; running cargo-semver-checks."
          fi

      - name: Check public API compatibility
        if: steps.api-inputs.outputs.run == 'true' && steps.breaking-change.outputs.found != 'true'
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
        with:
          manifest-path: Cargo.toml
          baseline-rev: ${{ github.event.pull_request.base.sha }}
          feature-group: all-features
          rust-toolchain: manual
          github-token: ${{ github.token }}

  public-rust-api-diff:
    name: Public Rust API diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect public API inputs
        id: api-inputs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD | tee changed-files.txt

          if grep -Eq '(^Cargo\.toml$|^crates/[^/]+/Cargo\.toml$|^crates/[^/]+/src/.*\.rs$|^crates/[^/]+/build\.rs$|^crates/[^/]+/wit/|^wit/)' changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Public API inputs changed; running cargo-public-api."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No public API inputs changed; skipping cargo-public-api."
          fi

      - name: Install Rust toolchains
        if: steps.api-inputs.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly-2026-06-29

      - name: Cache Rust artifacts
        if: steps.api-inputs.outputs.run == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          cache-on-failure: true

      - name: Install cargo-public-api
        if: steps.api-inputs.outputs.run == 'true'
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-public-api

      - name: Check public Rust item diff
        if: steps.api-inputs.outputs.run == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git log --format=%B "$BASE_SHA..$HEAD_SHA" \
            | grep -Eq '(^[A-Za-z0-9_-]+(\([^)]*\))?!:|^BREAKING[ -]CHANGE:)'; then
            DENY=""
            echo "Breaking-change marker found; reporting public API diff without denying changes."
          else
            DENY="--deny changed --deny removed"
            echo "No breaking-change marker found; denying changed or removed public API items."
          fi

          packages=$(cargo metadata --locked --format-version 1 --no-deps \
            | jq -r '.packages[]
              | select(.publish == null)
              | select(any(.targets[]; any(.kind[]; . == "lib")))
              | [.name, .manifest_path] | @tsv')

          while IFS=$'\t' read -r package manifest_path; do
            # A crate introduced by this PR has no manifest at the base SHA;
            # cargo-public-api cannot diff against a baseline where the
            # package does not exist, and the entire API is additive anyway.
            rel_manifest="${manifest_path#"$GITHUB_WORKSPACE/"}"
            if ! git cat-file -e "$BASE_SHA:$rel_manifest" 2>/dev/null; then
              echo "$package is new in this PR (no baseline at $BASE_SHA); skipping diff."
              continue
            fi
            echo "::group::cargo public-api $package"
            cargo +nightly-2026-06-29 public-api \
              --package "$package" \
              --all-features \
              -ss \
              diff \
              $DENY \
              --force \
              "$BASE_SHA..HEAD"
            echo "::endgroup::"
          done <<< "$packages"

  gateway-openapi-contract:
    name: Gateway OpenAPI contract
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: .openapi-target
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect gateway contract inputs
        id: gateway-inputs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD | tee changed-files.txt

          if grep -Eq '(^Cargo\.toml$|^Cargo\.lock$|^crates/astrid-gateway/Cargo\.toml$|^crates/astrid-gateway/src/|^crates/astrid-gateway/examples/print-openapi\.rs$)' changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Gateway contract inputs changed; diffing OpenAPI specs."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No gateway contract inputs changed; skipping OpenAPI diff."
          fi

      - name: Install Rust toolchain
        if: steps.gateway-inputs.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"

      - name: Cache Rust artifacts
        if: steps.gateway-inputs.outputs.run == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-${{ github.job }}
          workspaces: |
            . -> .openapi-target
          cache-on-failure: true

      - name: Detect OpenAPI contract-change marker
        if: steps.gateway-inputs.outputs.run == 'true'
        id: openapi-contract-change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git log --format=%B "$BASE_SHA..$HEAD_SHA" \
            | grep -Eq '^(OPENAPI|API)[ -]CONTRACT[ -]CHANGE:'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "OpenAPI contract-change marker found; generated diff will be reported without denying the PR."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No OpenAPI contract-change marker found; generated diff will deny the PR."
          fi

      - name: Diff generated OpenAPI spec
        if: steps.gateway-inputs.outputs.run == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OPENAPI_CONTRACT_CHANGE: ${{ steps.openapi-contract-change.outputs.found }}
        run: |
          mkdir -p /tmp/astrid-openapi
          cp crates/astrid-gateway/examples/print-openapi.rs /tmp/astrid-openapi/print-openapi.rs
          cp Cargo.lock /tmp/astrid-openapi/Cargo.lock

          generate_spec() {
            local ref="$1"
            local out="$2"

            git reset --hard
            git clean -fd -e .openapi-target
            git checkout "$ref"
            mkdir -p crates/astrid-gateway/examples
            cp /tmp/astrid-openapi/print-openapi.rs crates/astrid-gateway/examples/print-openapi.rs
            if [ ! -f Cargo.lock ]; then
              cp /tmp/astrid-openapi/Cargo.lock Cargo.lock
            fi

            cargo run --locked -p astrid-gateway --example print-openapi > "$out"
          }

          generate_spec "$BASE_SHA" /tmp/astrid-openapi/base.json
          generate_spec "$HEAD_SHA" /tmp/astrid-openapi/head.json

          if diff -u /tmp/astrid-openapi/base.json /tmp/astrid-openapi/head.json; then
            exit 0
          fi
          if [ "$OPENAPI_CONTRACT_CHANGE" = "true" ]; then
            echo "OpenAPI contract changed and was acknowledged by commit marker."
            exit 0
          fi
          echo "::error::OpenAPI contract changed without an API-CONTRACT-CHANGE: marker in a commit message."
          exit 1

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify lockfile
        run: cargo metadata --locked --no-deps > /dev/null

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ github.token }}
