name: Runtime E2E

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/runtime-e2e.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'crates/astrid-cli/**'
      - 'crates/astrid-config/**'
      - 'crates/astrid-core/**'
      - 'crates/astrid-daemon/**'
      - 'crates/astrid-events/**'
      - 'crates/astrid-gateway/**'
      - 'crates/astrid-kernel/**'
      - 'crates/astrid-capsule*/**'
      - 'crates/astrid-build/**'
      - 'crates/astrid-storage/**'
      - 'crates/astrid-types/**'
      - 'crates/astrid-uplink/**'
      - 'e2e/**'
      - 'scripts/e2e/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/runtime-e2e.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'crates/astrid-cli/**'
      - 'crates/astrid-config/**'
      - 'crates/astrid-core/**'
      - 'crates/astrid-daemon/**'
      - 'crates/astrid-events/**'
      - 'crates/astrid-gateway/**'
      - 'crates/astrid-kernel/**'
      - 'crates/astrid-capsule*/**'
      - 'crates/astrid-build/**'
      - 'crates/astrid-storage/**'
      - 'crates/astrid-types/**'
      - 'crates/astrid-uplink/**'
      - 'e2e/**'
      - 'scripts/e2e/**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  runtime-e2e:
    name: Runtime CLI + HTTP sweep
    # Platform policy: the full installed-runtime sweep is required on Linux,
    # where the capsule sandbox and GitHub runner environment are deterministic
    # enough for the long fake-provider story. macOS runtime confidence comes
    # from the regular workspace test matrix in ci.yml plus focused diagnostics;
    # it is not a silent skip of this job.
    runs-on: ubuntu-latest
    # Runtime budget: the harness has bounded daemon startup, curl/SSE, fake LLM,
    # cleanup, and child-process waits. The job-level cap catches any missed
    # product hang and keeps this workflow eligible for PR gating.
    timeout-minutes: 45
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout pinned Unicity AOS source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: unicity-aos/aos-ce
          path: .aos-ce
          ref: f23d4672b1cef775975fcf47791da86d84160c3b

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # MUST match rust-toolchain.toml's channel exactly. rustup treats
          # "1.95" and "1.95.0" as distinct toolchains, and the target std
          # must be installed on the toolchain cargo will actually use.
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown

      - name: Install pinned Unicity AOS capsule toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # The pinned AOS source currently builds its capsules with 1.94.0.
          # Install it up front so the runtime harness cannot trigger an
          # implicit rustup download halfway through the sweep.
          toolchain: "1.94.0"
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ runner.os }}-runtime-e2e-${{ hashFiles('**/Cargo.lock', 'capsules/**/Cargo.lock') }}
          cache-on-failure: true

      - name: Stage AOS monorepo outside core workspace
        run: |
          rm -rf "$RUNNER_TEMP/astrid-runtime-capsules"
          mkdir -p "$RUNNER_TEMP/astrid-runtime-capsules"
          git -C .aos-ce archive --format=tar HEAD | tar -x -C "$RUNNER_TEMP/astrid-runtime-capsules"
          cd "$RUNNER_TEMP/astrid-runtime-capsules/capsules"
          ln -s capsule-cli astrid-capsule-cli
          ln -s capsule-registry astrid-capsule-registry
          ln -s capsule-session astrid-capsule-session
          ln -s capsule-identity astrid-capsule-identity
          ln -s capsule-prompt-builder astrid-capsule-prompt-builder
          ln -s capsule-react astrid-capsule-react
          ln -s capsule-openai-compat astrid-capsule-openai-compat

      - name: Check first-party capsule command inventory
        run: |
          python3 scripts/e2e/check-first-party-capsule-commands.py --self-test
          python3 scripts/e2e/check-first-party-capsule-commands.py --capsules-dir "$RUNNER_TEMP/astrid-runtime-capsules/capsules"

      - name: Check CLI inventory coverage
        run: |
          cargo test -p astrid e2e_manifest_covers_every_visible_builtin_leaf_command
          cargo test -p astrid first_party_capsule_manifest_has_executable_scenarios

      - name: Check capability scenario coverage
        run: cargo test -p astrid-kernel e2e_capability_manifest_covers_catalog

      - name: Check HTTP route coverage
        run: cargo test -p astrid-gateway openapi_lists_every_router_route

      # Daemon-wedge boot-race guard: a second kernel booting on the same
      # ASTRID_HOME must lose the singleton race at the flock and report
      # "already running", NOT die on a raw surrealkv store LOCK (the pre-fix
      # ordering). `#[ignore]`-gated because it binds a real socket and mutates
      # process-global ASTRID_HOME, so it runs single-threaded here rather than
      # in the sandboxed workspace matrix.
      - name: Check daemon singleton boot-race ordering
        run: cargo test -p astrid-integration-tests --test daemon_wedge_e2e -- --ignored --test-threads=1

      - name: Run real runtime harness
        env:
          ASTRID_E2E_CAPSULES_DIR: ${{ runner.temp }}/astrid-runtime-capsules/capsules
        run: scripts/e2e/runtime-harness.sh

      - name: Upload runtime artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-e2e-artifacts
          path: |
            /tmp/astrid-runtime-e2e.*/artifacts/redacted-upload
            ${{ runner.temp }}/astrid-runtime-e2e.*/artifacts/redacted-upload
          if-no-files-found: ignore
