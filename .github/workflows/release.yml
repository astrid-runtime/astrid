name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build binaries for each platform ──────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # astrid-capsule's build.rs stages WIT files from the
          # `wit/` submodule (unicity-astrid/wit) before bindgen
          # consumes them. Without recursive submodule checkout the
          # release build fails with `read wit/host: No such file or
          # directory`. Matches the ci.yml fix landed in #752.
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # MUST match rust-toolchain.toml's channel EXACTLY (incl. patch).
          # rustup treats "1.95" and "1.95.0" as distinct toolchains: the
          # action adds `targets` to the toolchain it installs, but the build
          # uses the one rust-toolchain.toml pins. A mismatch installs the
          # cross-target std onto the wrong toolchain, so cross builds fail with
          # `error[E0463]: can't find crate for core/std`. Native builds escape
          # it because the host std ships with every toolchain by default.
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p astrid --locked

      - name: Package binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="astrid-${VERSION}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/astrid" "$DIR/"
          cp "target/${{ matrix.target }}/release/astrid-daemon" "$DIR/"
          cp "target/${{ matrix.target }}/release/astrid-build" "$DIR/"
          cp "target/${{ matrix.target }}/release/astrid-emit" "$DIR/"
          cp LICENSE* README.md "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Create the GitHub release with all binaries ───────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Download all binary artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/unicity-astrid/astrid/blob/${GITHUB_REF_NAME}/CHANGELOG.md) for details."
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compile Astrinauts for this release
        id: contributors
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            AUTHORS=$(git log --format='%aN' | sort -u)
          else
            AUTHORS=$(git log --format='%aN' "$PREV_TAG"..HEAD | sort -u)
          fi
          ASTRINAUTS=""
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            EMAIL=$(git log --format='%aE' --author="$name" -1)
            USERNAME=$(gh api "search/users?q=$EMAIL+in:email" --jq '.items[0].login // empty' 2>/dev/null || true)
            if [ -n "$USERNAME" ]; then
              ASTRINAUTS="${ASTRINAUTS}\n- @${USERNAME}"
            else
              ASTRINAUTS="${ASTRINAUTS}\n- ${name}"
            fi
          done <<< "$AUTHORS"
          {
            echo "list<<EOF"
            echo -e "$ASTRINAUTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest release provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release assets
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          for asset in *.tar.gz SHA256SUMS.txt; do
            cosign sign-blob --yes --bundle "${asset}.sigstore.json" "$asset"
          done

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
            artifacts/*.sigstore.json
          body: |
            ${{ steps.changelog.outputs.body }}

            ## Install

            **From source (requires Rust 1.95+):**
            ```
            cargo install astrid
            ```

            **Pre-built binaries:**
            Download the archive for your platform, extract, and add to PATH:
            ```
            tar xzf astrid-*-$(uname -m)-*.tar.gz
            sudo mv astrid-*/astrid astrid-*/astrid-daemon astrid-*/astrid-build astrid-*/astrid-emit /usr/local/bin/
            ```

            Then run `astrid init` to set up capsules.

            ---

            **With many thanks from the following Astrinauts** 🚀
            ${{ steps.contributors.outputs.list }}

      - name: Notify Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          gh api repos/unicity-astrid/homebrew-tap/dispatches \
            -f event_type=release \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"
