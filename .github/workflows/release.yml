name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
      - '!v[0-9]+.*-nightly.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: astrid-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  classify:
    name: Classify release lane
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      nightly: ${{ steps.release.outputs.nightly }}
      version: ${{ steps.release.outputs.version }}
      source-commit: ${{ steps.release.outputs.source-commit }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Bind event, tag, and source commit
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          [[ "$GITHUB_REF" == refs/tags/v* ]]
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_COMMIT=$(git rev-parse 'HEAD^{commit}')
          if [[ "$EVENT_NAME" == push ]]; then
            [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
            NIGHTLY=false
          elif [[ "$EVENT_NAME" == workflow_dispatch ]]; then
            NIGHTLY_DATE="${VERSION#*-nightly.}"
            NIGHTLY_DATE="${NIGHTLY_DATE%%.g*}"
            RUN_CREATED_AT=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --jq .created_at)
            python3 scripts/nightly_version.py validate-dispatch \
              --date "$NIGHTLY_DATE" \
              --created-at "$RUN_CREATED_AT"
            EXPECTED=$(python3 scripts/nightly_version.py derive \
              --date "$NIGHTLY_DATE" \
              --source-commit "$SOURCE_COMMIT")
            [[ "$VERSION" == "$EXPECTED" ]]
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$SOURCE_COMMIT" origin/main
            NIGHTLY=true
          else
            echo "unsupported release event: $EVENT_NAME" >&2
            exit 1
          fi
          {
            echo "nightly=$NIGHTLY"
            echo "version=$VERSION"
            echo "source-commit=$SOURCE_COMMIT"
          } >> "$GITHUB_OUTPUT"

  # ── Build binaries for each platform ──────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: classify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # astrid-capsule's build.rs stages WIT files from the
          # `wit/` submodule (astrid-runtime/wit) before bindgen
          # consumes them. Without recursive submodule checkout the
          # release build fails with `read wit/host: No such file or
          # directory`. Matches the ci.yml fix landed in #752.
          submodules: recursive

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Refuse a nightly after its canonical base is tagged
        if: needs.classify.outputs.nightly == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_VERSION=$(python3 - <<'PY'
          import tomllib
          with open("release/nightly.toml", "rb") as file:
              print(tomllib.load(file)["base-version"])
          PY
          )
          BASE_REFS="$RUNNER_TEMP/canonical-base-refs.json"
          gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/v$BASE_VERSION" > "$BASE_REFS"
          if ! jq -e --arg ref "refs/tags/v$BASE_VERSION" 'all(.ref != $ref)' "$BASE_REFS" >/dev/null; then
            echo "canonical v$BASE_VERSION was tagged while this nightly waited for approval" >&2
            exit 1
          fi

      - name: Stage deterministic nightly version
        if: needs.classify.outputs.nightly == 'true'
        run: python3 scripts/nightly_version.py stage --version "${GITHUB_REF_NAME#v}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # MUST match rust-toolchain.toml's channel EXACTLY (incl. patch).
          # rustup treats "1.95" and "1.95.0" as distinct toolchains: the
          # action adds `targets` to the toolchain it installs, but the build
          # uses the one rust-toolchain.toml pins. A mismatch installs the
          # cross-target std onto the wrong toolchain, so cross builds fail with
          # `error[E0463]: can't find crate for core/std`. Native builds escape
          # it because the host std ships with every toolchain by default.
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p astrid --locked

      - name: Package binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="astrid-${VERSION}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/astrid" "$DIR/"
          cp "target/${{ matrix.target }}/release/astrid-daemon" "$DIR/"
          cp "target/${{ matrix.target }}/release/astrid-build" "$DIR/"
          cp "target/${{ matrix.target }}/release/astrid-emit" "$DIR/"
          cp LICENSE* README.md "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Create the GitHub release with all binaries ───────────────────
  github-release:
    name: GitHub Release
    needs: [classify, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Require repository immutable releases
        env:
          GH_TOKEN: ${{ secrets.ASTRID_RELEASE_ADMIN_TOKEN }}
        run: |
          [[ -n "$GH_TOKEN" ]]
          gh api "repos/$GITHUB_REPOSITORY/immutable-releases" \
            --jq 'select(.enabled == true) | true' | grep -Fx true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Stage deterministic nightly version
        if: needs.classify.outputs.nightly == 'true'
        run: python3 scripts/nightly_version.py stage --version "${GITHUB_REF_NAME#v}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"

      - name: Install pinned b3sum
        run: cargo install b3sum --version 1.8.5 --locked

      - name: Download all binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      # The whole notes document is assembled into a FILE and handed to the
      # release action via `body_path`. An inline `body:` input reaches the
      # action as an environment variable on its node process, and a large
      # changelog section blows past the kernel's per-string env/arg ceiling
      # (E2BIG, "Argument list too long") before the step can even start —
      # exactly what killed the v0.9.0 release (#1105).
      - name: Compose release notes
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY: ${{ needs.classify.outputs.nightly }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=release-notes.md
          # Exact-prefix match on the version header — the version goes in as a
          # string, never a regex, so dots (or any metacharacter in a tag name)
          # cannot widen the match.
          awk -v ver="$VERSION" 'index($0, "## [" ver "]") == 1 {found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md > "$NOTES"
          if [ ! -s "$NOTES" ]; then
            echo "See [CHANGELOG.md](https://github.com/astrid-runtime/astrid/blob/${GITHUB_REF_NAME}/CHANGELOG.md) for details." > "$NOTES"
          fi
          cat >> "$NOTES" <<'INSTALL'

          ## Install
          INSTALL

          if [[ "$NIGHTLY" == true ]]; then
            cat >> "$NOTES" <<'INSTALL'

          Nightly releases are available only as signed pre-built binaries and
          through `astrid update --channel nightly`. They are not published to
          crates.io or Homebrew.
          INSTALL
          else
            cat >> "$NOTES" <<'INSTALL'

          **From source (requires Rust 1.95+):**
          ```
          cargo install astrid
          ```
          INSTALL
          fi

          cat >> "$NOTES" <<'INSTALL'

          **Pre-built binaries:**
          Download the archive for your platform, extract, and add to PATH:
          ```
          tar xzf astrid-*-$(uname -m)-*.tar.gz
          sudo mv astrid-*/astrid astrid-*/astrid-daemon astrid-*/astrid-build astrid-*/astrid-emit /usr/local/bin/
          ```

          Astrid Runtime does not bundle a product distro. To compose it with a
          distro you trust, run:
          ```
          astrid init --distro <name, @org/repo, path, or .shuttle>
          ```

          ---

          **With many thanks from the following Astrinauts** 🚀

          INSTALL
          PREV_TAG=$(git tag --merged HEAD --sort=-v:refname \
            | grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' \
            | grep -Fvx "$GITHUB_REF_NAME" \
            | sed -n '1p' || true)
          if [ -z "$PREV_TAG" ]; then
            AUTHORS=$(git log --format='%aN' | sort -u)
          else
            AUTHORS=$(git log --format='%aN' "$PREV_TAG"..HEAD | sort -u)
          fi
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            EMAIL=$(git log --format='%aE' --author="$name" -1)
            USERNAME=$(gh api "search/users?q=$EMAIL+in:email" --jq '.items[0].login // empty' 2>/dev/null || true)
            # A failed lookup must fall back to the plain author name, never
            # leak whatever stdout produced (the v0.9.0 run interpolated a raw
            # 422 error JSON as a contributor) — accept only a well-formed
            # GitHub login.
            if printf '%s' "$USERNAME" | grep -qE '^[A-Za-z0-9]([A-Za-z0-9-]{0,37}[A-Za-z0-9])?$' \
               && ! printf '%s' "$USERNAME" | grep -q -- '--'; then
              echo "- @${USERNAME}" >> "$NOTES"
            else
              echo "- ${name}" >> "$NOTES"
            fi
          done <<< "$AUTHORS"

      - name: Generate checksums
        run: |
          cd artifacts
          b3sum -- ./*.tar.gz | sed 's#  \./#  #' > BLAKE3SUMS.txt
          sha256sum -- ./*.tar.gz | sed 's#  \./#  #' > SHA256SUMS.txt
          b3sum --check BLAKE3SUMS.txt
          sha256sum --check SHA256SUMS.txt
          cat BLAKE3SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate immutable release manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)
          test "$VERSION" = "$CARGO_VERSION"
          SOURCE_COMMIT=$(git rev-parse "${GITHUB_REF_NAME}^{commit}")
          CONTRACTS_COMMIT=$(git -C wit rev-parse HEAD)
          python3 scripts/release_manifest.py generate \
            --artifacts artifacts \
            --version "$VERSION" \
            --tag "$GITHUB_REF_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --contracts-commit "$CONTRACTS_COMMIT" \
            --output "artifacts/astrid-${VERSION}-release.toml"
          python3 scripts/release_manifest.py validate \
            "artifacts/astrid-${VERSION}-release.toml" \
            --artifacts artifacts \
            --verify-artifacts
          {
            echo "VERSION=$VERSION"
            echo "SOURCE_COMMIT=$SOURCE_COMMIT"
            echo "CONTRACTS_COMMIT=$CONTRACTS_COMMIT"
          } >> "$GITHUB_ENV"

      - name: Detect an interrupted never-published draft
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
        run: |
          RELEASES="$RUNNER_TEMP/releases-preflight.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          MATCH_COUNT=$(jq -er --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)] | length' "$RELEASES")
          [[ "$MATCH_COUNT" -le 1 ]]
          if [[ "$MATCH_COUNT" == 0 ]]; then
            echo "EXISTING_RELEASE=0" >> "$GITHUB_ENV"
            exit 0
          fi
          jq -e --arg tag "$GITHUB_REF_NAME" --argjson prerelease "$EXPECTED_PRERELEASE" \
            '.[][] | select(.tag_name == $tag) | select(.draft == true and .prerelease == $prerelease and .published_at == null)' \
            "$RELEASES" >/dev/null || {
            echo "release $GITHUB_REF_NAME already exists and is not a never-published draft" >&2
            echo "release assets are write-once; never clobber, delete, or retag a published version" >&2
            exit 1
          }
          echo "EXISTING_RELEASE=1" >> "$GITHUB_ENV"

      - name: Attest release provenance
        if: env.EXISTING_RELEASE != '1'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/BLAKE3SUMS.txt
            artifacts/SHA256SUMS.txt
            artifacts/astrid-*-release.toml

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release assets
        if: env.EXISTING_RELEASE != '1'
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          for asset in *.tar.gz BLAKE3SUMS.txt SHA256SUMS.txt astrid-*-release.toml; do
            cosign sign-blob --yes --bundle "${asset}.sigstore.json" "$asset"
          done

      - name: Select and authenticate the exact release candidate
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
        run: |
          CANDIDATE="$GITHUB_WORKSPACE/artifacts"
          if [[ "$EXISTING_RELEASE" == 1 ]]; then
            CANDIDATE="$RUNNER_TEMP/existing-release-assets"
            RELEASES="$RUNNER_TEMP/releases-candidate.json"
            MATCHING_RELEASE="$RUNNER_TEMP/matching-release.json"
            gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
              --paginate --slurp > "$RELEASES"
            jq --arg tag "$GITHUB_REF_NAME" \
              '[.[][] | select(.tag_name == $tag)]' "$RELEASES" > "$MATCHING_RELEASE"
            jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
              'length == 1 and .[0].draft == true and .[0].prerelease == $prerelease and .[0].published_at == null' \
              "$MATCHING_RELEASE" >/dev/null
            RELEASE_ID=$(jq -er '.[0].id' "$MATCHING_RELEASE")
            echo "SELECTED_RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
            ASSETS="$RUNNER_TEMP/existing-release-assets.json"
            gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
              --paginate --slurp > "$ASSETS"
            jq -e '[.[][]] | all(.state == "uploaded" and .size > 0)' "$ASSETS" >/dev/null
            jq -e '[.[][]] as $assets | ([$assets[].name] | unique | length) == ($assets | length)' \
              "$ASSETS" >/dev/null
            mkdir "$CANDIDATE"
            gh release download "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "$CANDIDATE"
          fi
          PAYLOADS="$RUNNER_TEMP/release-payloads.txt"
          python3 scripts/release_publication.py \
            --artifacts "$CANDIDATE" \
            --version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --contracts-commit "$CONTRACTS_COMMIT" > "$PAYLOADS"
          (
            cd "$CANDIDATE"
            b3sum --check BLAKE3SUMS.txt
            sha256sum --check SHA256SUMS.txt
          )
          IDENTITY="https://github.com/astrid-runtime/astrid/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          ISSUER="https://token.actions.githubusercontent.com"
          while IFS= read -r asset; do
            cosign verify-blob \
              --bundle "$CANDIDATE/${asset}.sigstore.json" \
              --certificate-identity "$IDENTITY" \
              --certificate-oidc-issuer "$ISSUER" \
              --use-signed-timestamps \
              "$CANDIDATE/$asset"
          done < "$PAYLOADS"
          echo "CANDIDATE=$CANDIDATE" >> "$GITHUB_ENV"

      - name: Verify release archives with the native updater policy
        env:
          ASTRID_RELEASE_GATE_VERSION: ${{ github.ref_name }}
          CARGO_BUILD_JOBS: "1"
        run: |
          export ASTRID_RELEASE_GATE_ARTIFACTS="$CANDIDATE"
          ASTRID_RELEASE_GATE_VERSION="${ASTRID_RELEASE_GATE_VERSION#v}"
          export ASTRID_RELEASE_GATE_VERSION
          cargo test -p astrid --bin astrid --locked \
            commands::update_auth::tests::release_gate_authenticates_all_archives_with_production_policy \
            -- --ignored --exact

      - name: Authenticate the remote tag before candidate publication
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SOURCE: ${{ needs.classify.outputs.source-commit }}
          NIGHTLY: ${{ needs.classify.outputs.nightly }}
        run: |
          TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")
          TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
          TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          for _ in {1..8}; do
            [[ "$TAG_TYPE" == tag ]] || break
            TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_COMMIT")
            TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
            TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          done
          [[ "$TAG_TYPE" == commit ]]
          [[ "$TAG_COMMIT" == "$EXPECTED_SOURCE" ]]
          if [[ "$NIGHTLY" == true ]]; then
            BASE_VERSION=$(python3 - <<'PY'
          import tomllib
          with open("release/nightly.toml", "rb") as file:
              print(tomllib.load(file)["base-version"])
          PY
            )
            BASE_REFS="$RUNNER_TEMP/canonical-base-refs.json"
            gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/v$BASE_VERSION" > "$BASE_REFS"
            if ! jq -e --arg ref "refs/tags/v$BASE_VERSION" 'all(.ref != $ref)' "$BASE_REFS" >/dev/null; then
              echo "canonical v$BASE_VERSION was tagged while this nightly waited for approval" >&2
              exit 1
            fi
          fi

      - name: Require the release tag to remain unused before draft creation
        if: env.EXISTING_RELEASE != '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASES="$RUNNER_TEMP/releases-before-create.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          jq -e --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)] | length == 0' "$RELEASES" >/dev/null

      - name: Create draft release with write-once assets
        if: env.EXISTING_RELEASE != '1'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          prerelease: ${{ needs.classify.outputs.nightly == 'true' }}
          make_latest: false
          overwrite_files: false
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/BLAKE3SUMS.txt
            artifacts/SHA256SUMS.txt
            artifacts/astrid-*-release.toml
            artifacts/*.sigstore.json
          body_path: release-notes.md

      - name: Bind newly created draft identity
        if: env.EXISTING_RELEASE != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
        run: |
          RELEASES="$RUNNER_TEMP/releases-after-create.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          RELEASE_ID=$(jq -er --arg tag "$GITHUB_REF_NAME" --argjson prerelease "$EXPECTED_PRERELEASE" \
            '[.[][] | select(.tag_name == $tag) | select(.draft == true and .prerelease == $prerelease and .published_at == null)] | select(length == 1) | .[0].id' \
            "$RELEASES")
          echo "SELECTED_RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"

      - name: Reauthenticate and publish the exact immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
          EXPECTED_SOURCE: ${{ needs.classify.outputs.source-commit }}
        run: |
          EXPECTED_LATEST=true
          if [[ "$EXPECTED_PRERELEASE" == true ]]; then
            EXPECTED_LATEST=false
          fi
          TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")
          TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
          TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          for _ in {1..8}; do
            [[ "$TAG_TYPE" == tag ]] || break
            TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_COMMIT")
            TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
            TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          done
          [[ "$TAG_TYPE" == commit ]]
          [[ "$TAG_COMMIT" == "$EXPECTED_SOURCE" ]]
          if [[ "$EXPECTED_PRERELEASE" == true ]]; then
            BASE_VERSION=$(python3 - <<'PY'
          import tomllib
          with open("release/nightly.toml", "rb") as file:
              print(tomllib.load(file)["base-version"])
          PY
            )
            BASE_REFS="$RUNNER_TEMP/canonical-base-refs.json"
            gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/v$BASE_VERSION" > "$BASE_REFS"
            if ! jq -e --arg ref "refs/tags/v$BASE_VERSION" 'all(.ref != $ref)' "$BASE_REFS" >/dev/null; then
              echo "canonical v$BASE_VERSION was tagged before nightly publication" >&2
              exit 1
            fi
          fi
          RELEASES="$RUNNER_TEMP/releases-before-publish.json"
          MATCHING_RELEASE="$RUNNER_TEMP/matching-release-before-publish.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          jq --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)]' "$RELEASES" > "$MATCHING_RELEASE"
          jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
            'length == 1 and .[0].draft == true and .[0].prerelease == $prerelease and .[0].published_at == null' \
            "$MATCHING_RELEASE" >/dev/null
          RELEASE_ID=$(jq -er '.[0].id' "$MATCHING_RELEASE")
          [[ "$RELEASE_ID" == "$SELECTED_RELEASE_ID" ]]
          ASSETS="$RUNNER_TEMP/release-assets-before-publish.json"
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
            --paginate --slurp > "$ASSETS"
          jq -e '[.[][]] | all(.state == "uploaded" and .size > 0)' "$ASSETS" >/dev/null
          jq -e '[.[][]] as $assets | ([$assets[].name] | unique | length) == ($assets | length)' \
            "$ASSETS" >/dev/null

          FINAL="$RUNNER_TEMP/final-release-assets"
          mkdir "$FINAL"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$FINAL"
          PAYLOADS="$RUNNER_TEMP/final-release-payloads.txt"
          python3 scripts/release_publication.py \
            --artifacts "$FINAL" \
            --version "$VERSION" \
            --source-commit "$SOURCE_COMMIT" \
            --contracts-commit "$CONTRACTS_COMMIT" > "$PAYLOADS"
          (
            cd "$FINAL"
            b3sum --check BLAKE3SUMS.txt
            sha256sum --check SHA256SUMS.txt
          )
          IDENTITY="https://github.com/astrid-runtime/astrid/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          while IFS= read -r asset; do
            cmp "$CANDIDATE/$asset" "$FINAL/$asset"
            cmp "$CANDIDATE/${asset}.sigstore.json" "$FINAL/${asset}.sigstore.json"
            cosign verify-blob \
              --bundle "$FINAL/${asset}.sigstore.json" \
              --certificate-identity "$IDENTITY" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --use-signed-timestamps \
              "$FINAL/$asset"
          done < "$PAYLOADS"

          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false \
            -f make_latest="$EXPECTED_LATEST" \
            | jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
              'select(.draft == false and .immutable == true and .prerelease == $prerelease and .published_at != null) | true' \
            | grep -Fx true
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
            | jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
              'select(.draft == false and .immutable == true and .prerelease == $prerelease and .published_at != null) | true' \
            | grep -Fx true
